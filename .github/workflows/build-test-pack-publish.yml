name: Build, Test, Pack, Publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      slnx_file:
        description: "Path to the .slnx file (defaults to DotnetVersionReader.slnx)"
        required: false

permissions:
  contents: write

jobs:
  login:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      nuget_api_key: ${{ steps.login.outputs.NUGET_API_KEY }}
    steps:
      - name: NuGet login (OIDC → temp API key)
        id: login
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

  build-test-pack-publish:
    needs: login
    permissions:
      contents: write
    uses: wertzui/Actions/.github/workflows/nuget-build.yml@main
    with:
      solution_file: ${{ inputs.slnx_file || 'DotnetVersionReader.slnx' }}
    secrets:
      nuget_api_key: ${{ needs.login.outputs.nuget_api_key }}