name: Build, Test, Pack, Publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      slnx_file:
        description: "Path to the .slnx file (defaults to DotnetVersionReader.slnx)"
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  build-test-pack-publish:
    uses: wertzui/Actions/.github/workflows/nuget-build.yml@main
    with:
      solution_file: ${{ inputs.slnx_file || 'DotnetVersionReader.slnx' }}
    secrets:
      nuget_user: ${{ secrets.NUGET_USER }}