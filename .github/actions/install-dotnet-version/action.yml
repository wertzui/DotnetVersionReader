name: 'Install dotnet-version'
description: 'Installs the DotnetVersionReader global tool (dotnet-version) from NuGet.org. Updates the tool if it is already installed.'

inputs:
  version:
    description: >
      The version of DotnetVersionReader to install.
      Leave empty to install the latest stable release.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install dotnet-version global tool
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $version     = '${{ inputs.version }}'
        $versionArgs = if ($version) { @('--version', $version) } else { @() }

        dotnet tool install -g DotnetVersionReader @versionArgs
        if ($LASTEXITCODE -ne 0) {
          # Tool is already installed — update it instead
          dotnet tool update -g DotnetVersionReader @versionArgs
        }
