name: 'Read .NET project versions'
description: 'Reads version information from a .slnx or .csproj file and outputs structured metadata ready for use in git tags and GitHub releases.'

inputs:
  input:
    description: 'Path to the .slnx or .csproj file.'
    required: true
  filter:
    description: 'Property filter expression (e.g. "GeneratePackageOnBuild=true").'
    required: false
    default: ''
  create_tags:
    description: 'When true, git-tags the current commit with each package version and the combined release tag.'
    required: false
    default: 'false'

outputs:
  json:
    description: 'JSON array of { Name, Version } objects for all matched projects.'
    value: ${{ steps.read.outputs.json }}
  tags:
    description: 'Newline-separated list of individual package tags in "Name-vVersion" format.'
    value: ${{ steps.read.outputs.tags }}
  release_tag:
    description: 'Combined release tag string, e.g. "release-MyPkg-v1.2.3".'
    value: ${{ steps.read.outputs.release_tag }}
  release_name:
    description: 'Human-readable release name, e.g. "Release: MyPkg 1.2.3".'
    value: ${{ steps.read.outputs.release_name }}
  release_body:
    description: 'Markdown-formatted release body listing all packages and their versions.'
    value: ${{ steps.read.outputs.release_body }}

runs:
  using: composite
  steps:
    - name: Read versions
      id: read
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $extraArgs = @()
        $filter = '${{ inputs.filter }}'
        if ($filter) {
          $extraArgs += '--filter', $filter
        }

        $rawOutput = dotnet-version read --input '${{ inputs.input }}' @extraArgs --output json 2>&1
        Write-Host $rawOutput

        $pairs = @($rawOutput | ConvertFrom-Json |
          ForEach-Object { [PSCustomObject]@{ Name = $_.Name; Version = $_.Version } })

        if (-not $pairs) {
          throw "Could not determine package names/versions from dotnet-version output."
        }

        $tagList = New-Object System.Collections.Generic.List[string]
        foreach ($p in $pairs) {
          $rawTag  = "$($p.Name)-v$($p.Version)"
          $safeTag = ($rawTag -replace '[^0-9A-Za-z._/-]', '-')
          if (-not $tagList.Contains($safeTag)) {
            $tagList.Add($safeTag)
          }
        }

        $summaryParts  = @($pairs | ForEach-Object { "$($_.Name) $($_.Version)" })
        $releaseName   = "Release: " + ($summaryParts -join ', ')
        $releaseTagRaw = "release-" + (($pairs | ForEach-Object { "$($_.Name)-v$($_.Version)" }) -join '__')
        $releaseTag    = ($releaseTagRaw -replace '[^0-9A-Za-z._/-]', '-')
        if ($releaseTag.Length -gt 200) {
          $releaseTag = "release-${{ github.run_number }}-${{ github.sha }}"
        }

        $body       = @("Packages in this release:") + ($pairs | ForEach-Object { "- $($_.Name) $($_.Version)" })
        $bodyJoined = $body -join "`n"
        $tagsJoined = $tagList -join "`n"
        $jsonOutput = $pairs | ConvertTo-Json -Compress

        "json<<EOF"         >> $env:GITHUB_OUTPUT
        $jsonOutput         >> $env:GITHUB_OUTPUT
        "EOF"               >> $env:GITHUB_OUTPUT

        "tags<<EOF"         >> $env:GITHUB_OUTPUT
        $tagsJoined         >> $env:GITHUB_OUTPUT
        "EOF"               >> $env:GITHUB_OUTPUT

        "release_tag=$releaseTag"   >> $env:GITHUB_OUTPUT
        "release_name=$releaseName" >> $env:GITHUB_OUTPUT

        "release_body<<EOF" >> $env:GITHUB_OUTPUT
        $bodyJoined         >> $env:GITHUB_OUTPUT
        "EOF"               >> $env:GITHUB_OUTPUT

    - name: Tag commit with package versions
      if: inputs.create_tags == 'true'
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $ErrorActionPreference = 'Stop'

        $tags = @('${{ steps.read.outputs.tags }}' -split "`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

        git config user.name  'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

        foreach ($tag in $tags) {
          $exists = git tag -l "$tag"
          if ($exists) {
            Write-Host "Tag already exists: $tag"
            continue
          }
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
        }

        $releaseTag    = '${{ steps.read.outputs.release_tag }}'
        $releaseExists = git tag -l "$releaseTag"
        if (-not $releaseExists) {
          git tag -a "$releaseTag" -m '${{ steps.read.outputs.release_name }}'
          git push origin "$releaseTag"
        }
